[build]
builder = "dockerfile"
dockerfilePath = "subtitleai/backend/Dockerfile"

[deploy]
startCommand = "cd subtitleai/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PORT = "8000"